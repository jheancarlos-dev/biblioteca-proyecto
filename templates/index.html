{% extends "base.html" %}
{% block title %}Calcular préstamo — Biblioteca{% endblock %}
{% block content %}
  <h1>Préstamo de biblioteca</h1>
  <p class="lede">Indica el tipo de usuario y los datos para estimar la multa y la fecha límite de devolución.</p>
  <div class="card">
    <form method="post" action="{{ url_for('calcular') }}" novalidate>
      <label for="tipo_usuario">Tipo de usuario</label>
      <select id="tipo_usuario" name="tipo_usuario" required>
        <option value="" disabled selected>Selecciona una opción</option>
        <option value="estudiante">Estudiante</option>
        <option value="docente">Docente</option>
      </select>

      <label for="dias_retraso">Días de retraso</label>
      <input id="dias_retraso" name="dias_retraso" type="number" inputmode="numeric" min="0" step="1" required placeholder="0">

      <label for="cantidad_libros">Cantidad de libros</label>
      <input id="cantidad_libros" name="cantidad_libros" type="number" inputmode="numeric" min="1" step="1" required placeholder="1">

      <button type="submit">Calcular</button>
    </form>
  </div>
{% endblock %}
