<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Biblioteca{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f2ef;
      --card: #fff;
      --text: #1c1917;
      --muted: #57534e;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --danger-text: #991b1b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: 32rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 650;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    .lede {
      color: var(--muted);
      margin: 0 0 1.5rem;
      font-size: 0.95rem;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.35rem 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid #d6d3d1;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
      background: #fff;
    }
    select:focus, input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 0.25rem;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button[type="submit"]:hover {
      background: var(--accent-hover);
    }
    .back {
      display: inline-block;
      margin-top: 1.25rem;
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .back:hover { text-decoration: underline; }
    .error {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: var(--danger-text);
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    .ok dt {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-top: 0.75rem;
    }
    .ok dt:first-child { margin-top: 0; }
    .ok dd {
      margin: 0.2rem 0 0;
      font-size: 1.05rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
